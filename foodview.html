<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }

        .food-container {
            margin-top: 50px;
        }

        .food-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #fff;
        }

        .food-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .food-content {
            padding: 30px;
        }

        .food-title {
            font-size: 2rem;
            font-weight: bold;
        }

        .food-price {
            font-size: 1.5rem;
            color: #ff512f;
            margin: 10px 0;
        }

        .btn-order {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: #fff;
            border-radius: 25px;
            padding: 10px 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-order:hover {
            background: #000;
            color: #fff;
        }

        /* Stylish Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: #fff;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: #000;
            transform: translateY(-2px);
        }

        .back-btn:hover i {
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .food-img {
                height: 250px;
            }

            .food-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

<div class="container food-container">

    <!-- Back Button -->
    <a href="foodweb.html" class="back-btn mb-3">
        <i class="bi bi-arrow-left"></i>
        <span>Back to Menu</span>
    </a>

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="food-card">

                <!-- Image -->
                <img id="foodImg" class="food-img">

                <!-- Content -->
                <div class="food-content text-center">

                    <h2 id="foodName" class="food-title"></h2>

                    <!-- Quantity -->
                    <div class="d-flex justify-content-center align-items-center gap-3 my-3">

                        <button class="btn btn-outline-danger" onclick="decreaseQty()">-</button>

                        <span id="qty" style="font-size: 20px; font-weight: bold;">1</span>

                        <button class="btn btn-outline-success" onclick="increaseQty()">+</button>

                    </div>

                    <!-- Total Price -->
                    <h4 id="totalPrice" class="food-price"></h4>

                    <!-- Add to Cart -->
                    <button class="btn btn-order mt-3">
                        <i class="bi bi-cart"></i> Add to Cart
                    </button>

                </div>

            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script>
const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let rawPrice = params.get("price");
let img = params.get("img");

// Clean price (removes ₹ if exists)


let price = Number(rawPrice.replace(/[^\d]/g, ""));
let quantity = 1;

// Set data
document.getElementById("foodName").innerText = name;
document.getElementById("foodImg").src = img;

// Update price
function updatePrice() {
    document.getElementById("totalPrice").innerText = "₹" + (price * quantity);
}

// Increase
function increaseQty() {
    quantity++;
    document.getElementById("qty").innerText = quantity;
    updatePrice();
}

// Decrease
function decreaseQty() {
    if (quantity > 1) {
        quantity--;
        document.getElementById("qty").innerText = quantity;
        updatePrice();
    }
}

// Initial
updatePrice();
</script>

</body>
</html>
